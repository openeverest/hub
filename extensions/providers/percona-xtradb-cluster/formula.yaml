# yaml-language-server: $schema=../../../schemas/formula-v1.json
apiVersion: hub.openeverest.io/v1
kind: Extension

metadata:
  name: percona-xtradb-cluster
  type: provider
  displayName: "Percona XtraDB Cluster"
  icon: ./mysql_icon.png
  description: |
    Highly available MySQL clusters powered by the Percona Operator for MySQL
    based on Percona XtraDB Cluster (PXC).
  categories:
    - database
    - mysql
  keywords:
    - mysql
    - percona
    - xtradb
    - pxc
    - galera
  homepage: https://github.com/openeverest/provider-percona-xtradb-cluster
  sourceRepo: https://github.com/openeverest/provider-percona-xtradb-cluster
  license: Apache-2.0
  maturity: alpha
  maintainers:
    - name: "OpenEverest Team"
      email: "cncf-openeverest-maintainers@lists.cncf.io"
      github: "openeverest"

spec:
  provider:
    providerName: percona-xtradb-cluster
    supportedEngines:
      - mysql

  compatibility:
    openeverest: ">=2.0.0"

  capabilities:
    ha: true
    backups: true
    pitr: true
    restores: true
    monitoring: true
    mysql.versions: ["8.0", "8.4"]

  artifacts:
    chart:
      defaultChannel: stable
      channels:
        stable:
          ref: oci://ghcr.io/openeverest/charts/provider-percona-xtradb-cluster
          version: "0.1.0"

  install:
    helm:
      releaseName: provider-percona-xtradb-cluster
      namespace: everest-system
