# yaml-language-server: $schema=../../../schemas/formula-v1.json
apiVersion: hub.openeverest.io/v1
kind: Extension

metadata:
  name: generic-plugin-template
  type: plugin
  displayName: "Generic Plugin Template"
  description: |
    A working "hello world" OpenEverest plugin: registers a sidebar entry,
    a dedicated route, a cluster-detail tab, and a backend API endpoint.
    Use it as a starting point when building your own generic plugin.
  categories:
    - example
    - template
  keywords:
    - hello-world
    - starter
    - tutorial
  homepage: https://github.com/openeverest/generic-plugin-template
  sourceRepo: https://github.com/openeverest/generic-plugin-template
  license: Apache-2.0
  maturity: alpha
  maintainers:
    - name: "OpenEverest Team"
      email: "cncf-openeverest-maintainers@lists.cncf.io"
      github: "openeverest"

spec:
  plugin:
    contributes:
      ui: true
      backend: true
      cli: false
    extensionPoints:
      - route
      - sidebarItem
      - clusterDetailTab

  compatibility:
    openeverest: ">=2.0.0"

  artifacts:
    chart:
      defaultChannel: stable
      channels:
        stable:
          ref: oci://ghcr.io/openeverest/charts/my-plugin
          version: "0.1.0"

  install:
    helm:
      releaseName: my-plugin
      namespace: everest-system
